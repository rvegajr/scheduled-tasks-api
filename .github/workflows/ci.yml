name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            framework: net10.0
            name: Linux
          - os: macos-latest
            framework: net10.0
            name: macOS
          - os: windows-latest
            framework: net10.0-windows
            name: Windows

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --framework ${{ matrix.framework }} --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.name }}
          path: '**/test-results.trx'

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    name: Docker Build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t scheduled-tasks-api:ci .

      - name: Verify container starts
        run: |
          docker run -d --name test-api -p 5000:8080 \
            -e AllowedTasks="*" \
            -e AllowedServices="*" \
            scheduled-tasks-api:ci
          sleep 5
          curl -f http://localhost:5000/swagger/index.html || (docker logs test-api && exit 1)
          docker stop test-api
