name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            name: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
            name: linux-arm64
          - os: macos-latest
            rid: osx-arm64
            name: macos-arm64
          - os: windows-latest
            rid: win-x64
            name: windows-x64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/ScheduledTasksApi/ScheduledTasksApi.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          -o publish/${{ matrix.name }}

      - name: Archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd publish/${{ matrix.name }}
          tar -czf ../../scheduled-tasks-api-${{ matrix.name }}.tar.gz .

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path publish/${{ matrix.name }}/* -DestinationPath scheduled-tasks-api-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: scheduled-tasks-api-${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
